<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競プロ学習ノート</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #d8e0e7;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #15803d;
      --radius: 8px;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.7;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1040px, calc(100vw - 2rem));
      margin: 0 auto;
      padding: 3rem 0;
    }

    .intro {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .kicker {
      margin: 0;
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.7rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      color: #334155;
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      font-weight: 650;
    }

    .section {
      display: grid;
      gap: 1rem;
      margin-top: 2rem;
    }

    .section h2 {
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .guide-list {
      display: grid;
      gap: 1rem;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .guide-card {
      display: grid;
      gap: 0.7rem;
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--surface);
      padding: 1rem 1.1rem;
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(23, 32, 51, 0.08);
    }

    .guide-card:hover,
    .guide-card:focus-visible {
      border-color: var(--blue);
      background: #fbfdff;
      outline: none;
    }

    .guide-card h3 {
      font-size: clamp(1.25rem, 2.4vw, 1.65rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .guide-card p {
      color: #334155;
      font-weight: 650;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      padding: 0.15rem 0.58rem;
      font-size: 0.85rem;
      font-weight: 800;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .resource-link {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 0.75rem 0.9rem;
      color: #334155;
      font-family: var(--mono);
      font-size: 0.94rem;
      font-weight: 800;
      text-decoration: none;
    }

    .resource-link:hover,
    .resource-link:focus-visible {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #1d4ed8;
      outline: none;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 1.3rem, 1040px);
        padding: 1.5rem 0 2.5rem;
      }

      .resource-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro" aria-labelledby="pageTitle">
      <p class="kicker">Kyopro Learn</p>
      <h1 id="pageTitle">競プロ学習ノート</h1>
      <p class="lead">競技プログラミングの考え方を、スライド形式の解説と実装例で整理しています。</p>
    </section>

    <section class="section" aria-labelledby="guidesTitle">
      <h2 id="guidesTitle">解説一覧</h2>
      <ul class="guide-list">
        <li>
          <a class="guide-card" href="./binary-search-basic/">
            <div class="meta-row" aria-label="トピック">
              <span class="tag">二分探索</span>
              <span class="tag">Python</span>
              <span class="tag">AtCoder</span>
            </div>
            <h3>二分探索の基礎</h3>
            <p>Yes / No が一度だけ切り替わる問題に直して、境界を高速に探す考え方を扱います。</p>
          </a>
        </li>
      </ul>
    </section>

    <section class="section" aria-labelledby="resourcesTitle">
      <h2 id="resourcesTitle">関連コード</h2>
      <div class="resource-grid">
        <a class="resource-link" href="./binary-search-basic/abc231_c.py">abc231_c.py</a>
        <a class="resource-link" href="./binary-search-basic/abc231_c_bisect.py">abc231_c_bisect.py</a>
        <a class="resource-link" href="./binary-search-basic/abc388_c.py">abc388_c.py</a>
        <a class="resource-link" href="./binary-search-basic/abc388_c_bisect.py">abc388_c_bisect.py</a>
        <a class="resource-link" href="./binary-search-basic/typical90_001.py">typical90_001.py</a>
      </div>
    </section>
  </main>
</body>
</html>
